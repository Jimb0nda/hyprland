"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [1, 4, 3]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "none"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap           = "no"
tab_size       = 2
max_width      = 600
max_height     = 900
image_delay    = 30
image_filter   = "triangle"
image_quality  = 75
sixel_fraction = 15

[opener]
edit = [
	{ run = 'nvim %s1', block = true, desc = "Neovim", for = "linux" },
]

play = [
	{ run = 'mpv --force-window %s1', orphan = true, desc = "Play", for = "linux" },
]

open = [
	{ run = 'xdg-open %s1', orphan = true, desc = "Open", for = "linux" },
]

reveal = [
	{ run = 'xdg-open "$(dirname %s1)"', orphan = true, desc = "Reveal", for = "linux" },
]

[open]
prepend_rules = [
	# Code / text files -> Neovim
	{ url = "*.{cs,py,lua,txt,md,markdown,json,toml,yaml,yml,xml,html,css,scss,js,ts,tsx,jsx,rs,go,java,kt,kts,c,cpp,h,hpp,sh,bash,zsh,fish,sql,ini,conf,config,env,gitignore,dockerfile,Dockerfile}", use = "edit" },

	# Common text/config MIME types -> Neovim
	{ mime = "text/*", use = "edit" },
	{ mime = "application/json", use = "edit" },
	{ mime = "application/x-ndjson", use = "edit" },
	{ mime = "application/xml", use = "edit" },
	{ mime = "application/x-yaml", use = "edit" },
	{ mime = "application/toml", use = "edit" },

	# Videos -> mpv
	{ url = "*.{mp4,mkv,webm,avi,mov,m4v}", use = "play" },
	{ mime = "video/*", use = "play" },

	# Audio -> mpv
	{ url = "*.{mp3,flac,wav,ogg,m4a,opus}", use = "play" },
	{ mime = "audio/*", use = "play" },
]
